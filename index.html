<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Manna</title>
<meta name="description" content="Daily devotional articles from the SCC Bible reading plan.">
<meta name="theme-color" content="#f7f2e9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Manna">
<style>
  :root {
    --paper: #f7f2e9;
    --paper-deep: #efe7d8;
    --ink: #33291e;
    --ink-soft: #6b5d4b;
    --accent: #9c4221;
    --accent-soft: #c05621;
    --rule: #ddd2bf;
    --serif: "Charter", "Iowan Old Style", "Palatino", "Georgia", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 20px;
    line-height: 1.68;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 40rem; margin: 0 auto; padding: 0 1.35rem 4rem; }

  /* ---------- masthead ---------- */
  header.masthead { text-align: center; padding: 2.6rem 0 1.4rem; }
  .brand {
    font-size: 1.05rem; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
  }
  .brand-rule {
    width: 3.2rem; height: 3px; background: var(--accent);
    margin: 0.85rem auto 0; border-radius: 2px;
  }

  /* ---------- home ---------- */
  .home-date { text-align: center; font-size: 1.28rem; font-style: italic; color: var(--ink-soft); margin-top: 0.4rem; }
  .readings-card {
    margin: 1.8rem 0 2.2rem; padding: 1.4rem 1.5rem;
    background: var(--paper-deep); border-radius: 14px;
  }
  .readings-card h2 {
    font-size: 0.82rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 700; margin-bottom: 0.8rem;
  }
  .readings-card ul { list-style: none; }
  .readings-card li {
    padding: 0.34rem 0; font-size: 1.02rem; color: var(--ink);
    display: flex; gap: 0.7rem; align-items: baseline;
  }
  .readings-card li .tag {
    flex: none; width: 5.6rem; font-size: 0.78rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent); font-weight: 700;
  }
  .readings-card li a.ref { color: var(--ink); text-decoration: none; border-bottom: 1px dotted var(--rule); }
  .kicker a.ref { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
  .choice { display: flex; flex-direction: column; gap: 0.9rem; }
  .btn {
    display: block; width: 100%; border: none; cursor: pointer;
    font-family: var(--serif); text-align: center; text-decoration: none;
    border-radius: 14px; padding: 1.15rem 1rem; font-size: 1.22rem; line-height: 1.35;
  }
  .btn-primary { background: var(--accent); color: #fdf9f1; font-weight: 700; }
  .btn-secondary { background: transparent; color: var(--accent); border: 2px solid var(--accent); font-weight: 700; }
  .btn small { display: block; font-size: 0.86rem; font-weight: 400; opacity: 0.85; margin-top: 0.2rem; }
  .home-note { text-align: center; color: var(--ink-soft); font-size: 0.92rem; margin-top: 2rem; font-style: italic; }
  .archive-link {
    display: block; width: 100%; margin-top: 1.4rem; background: none; border: none;
    font-family: var(--serif); cursor: pointer; text-align: center;
    color: var(--accent); font-size: 1.02rem; font-weight: 700; padding: 0.6rem;
    letter-spacing: 0.02em;
  }

  /* ---------- reading top bar ---------- */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: 40rem; margin: 0 auto; padding: 0.55rem 1.1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar button {
    background: none; border: none; font-family: var(--serif); cursor: pointer;
    color: var(--accent); font-size: 1rem; font-weight: 700; padding: 0.3rem 0.2rem;
  }
  .topbar .where { font-size: 0.85rem; color: var(--ink-soft); letter-spacing: 0.12em; text-transform: uppercase; }
  .progress { height: 3px; background: transparent; }
  .progress > div { height: 100%; width: 0; background: var(--accent-soft); transition: width 0.15s linear; }

  /* ---------- article ---------- */
  main.reading { padding-top: 4.2rem; }
  .art { padding: 2.4rem 0 1rem; }
  .art-head {
    display: block; width: 100%; text-align: left; background: none; border: none;
    font-family: var(--serif); color: var(--ink); cursor: pointer; padding: 0;
  }
  .kicker {
    display: flex; gap: 0.8rem; align-items: baseline; flex-wrap: wrap;
    font-size: 0.84rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 0.9rem;
  }
  .kicker .mins { color: var(--ink-soft); letter-spacing: 0.08em; font-weight: 400; }
  .art h1 {
    font-size: 2.15rem; line-height: 1.16; letter-spacing: -0.01em; margin-bottom: 0.9rem;
  }
  .read-badge {
    display: none; align-items: center; gap: 0.45rem;
    font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 700; margin-bottom: 0.4rem;
  }
  .read-badge .chev { color: var(--accent); }
  .dek {
    font-size: 1.18rem; line-height: 1.5; font-style: italic; color: var(--ink-soft);
    margin-bottom: 1.9rem;
  }
  .body p { margin-bottom: 1.25rem; }
  .body p:first-of-type::first-letter {
    font-size: 3.4em; float: left; line-height: 0.82; padding: 0.08em 0.12em 0 0;
    color: var(--accent); font-weight: 700;
  }
  .body blockquote {
    margin: 2rem 0.4rem; padding: 0 0 0 1.15rem; border-left: 3px solid var(--accent);
    font-size: 1.22rem; line-height: 1.5; color: var(--accent); font-weight: 500;
  }
  .body strong { color: var(--ink); }
  .end-mark { text-align: center; color: var(--accent); font-size: 1.6rem; padding: 1.6rem 0 0.2rem; }
  .collapse-btn {
    display: block; margin: 0.2rem auto 0; background: none; border: none;
    font-family: var(--serif); cursor: pointer; color: var(--ink-soft);
    font-size: 0.86rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;
    padding: 0.5rem 1rem;
  }
  /* collapsed state: hide the reading body + drop cap, reveal the "read" badge */
  .art.collapsed .art-body { display: none; }
  .art.collapsed .art-head h1 { margin-bottom: 0.2rem; opacity: 0.72; }
  .art.collapsed .read-badge { display: flex; }
  .read-badge .heart { color: var(--accent); }

  .love-btn {
    display: inline-flex; align-items: center; gap: 0.45rem; margin: 0.2rem auto 0;
    background: none; border: none; font-family: var(--serif); cursor: pointer;
    color: var(--ink-soft); font-size: 0.86rem; letter-spacing: 0.14em;
    text-transform: uppercase; font-weight: 700; padding: 0.5rem 1rem;
  }
  .love-btn .ic { font-size: 1.1rem; line-height: 1; }
  .love-btn.loved { color: var(--accent); }
  .export-btn {
    display: inline-flex; align-items: center; gap: 0.45rem; margin: 0.2rem auto 0;
    background: none; border: none; font-family: var(--serif); cursor: pointer;
    color: var(--accent); font-size: 0.86rem; letter-spacing: 0.14em;
    text-transform: uppercase; font-weight: 700; padding: 0.5rem 1rem;
  }
  .print-head { display: none; }

  /* ---------- print / Save-as-PDF: isolate one article, drop all UI ---------- */
  /* margin:0 suppresses the browser's own URL/date header & footer; the page
     whitespace is provided by padding on the article instead. */
  @page { margin: 0; }
  @media print {
    .topbar, .progress, .more-wrap, .finish, .divider,
    .love-btn, .collapse-btn, .export-btn, .read-badge, .kicker .mins { display: none !important; }
    body { background: #fff; }
    main.reading { padding-top: 0 !important; }
    .wrap { max-width: 100%; padding: 0; }
    body.printing .art { display: none !important; }
    body.printing .art.print-target { display: block !important; padding: 1.5cm 1.3cm !important; }
    body.printing .art.print-target .art-body { display: block !important; }
    .art.print-target .print-head {
      display: block; text-align: center; margin-bottom: 1.4rem; color: var(--accent);
      font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700;
    }
    .art h1 { page-break-after: avoid; }
    .body blockquote { page-break-inside: avoid; }
  }

  .gen-note { text-align: center; color: var(--ink-soft); font-size: 0.96rem; font-style: italic; margin-top: 1.1rem; min-height: 1.2em; }
  .btn[disabled] { opacity: 0.6; cursor: default; }
  .regen { margin-top: 0.9rem; }

  .divider {
    display: flex; align-items: center; gap: 1rem; color: var(--ink-soft);
    font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 1.2rem 0 0;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--rule); }

  .more-wrap { text-align: center; padding: 2.5rem 0 1rem; }
  .finish { text-align: center; padding: 3rem 0 2rem; color: var(--ink-soft); font-style: italic; }
  .finish .verse { font-size: 1.05rem; margin-bottom: 1.6rem; }
  .allread {
    margin: 0.6rem 0 1.6rem; padding: 1rem 1.2rem; background: var(--paper-deep);
    border-radius: 12px; text-align: center; color: var(--ink-soft); font-size: 0.98rem;
  }
  .allread strong { color: var(--ink); font-style: normal; }

  /* ---------- archive ---------- */
  .archive-head { text-align: center; padding: 0.4rem 0 1.4rem; }
  .archive-head h2 { font-size: 1.7rem; color: var(--ink); }
  .day-list { list-style: none; margin-top: 0.5rem; }
  .day-row {
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    width: 100%; background: var(--paper-deep); border: none; cursor: pointer;
    font-family: var(--serif); text-align: left; color: var(--ink);
    border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.7rem;
  }
  .day-row .d-date { display: block; font-size: 1.14rem; font-weight: 700; }
  .day-row .d-meta { display: block; font-size: 0.88rem; color: var(--ink-soft); margin-top: 0.15rem; }
  .day-row .d-right { display: flex; align-items: center; gap: 0.6rem; flex: none; }
  .day-row .d-count {
    font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
  }
  .day-row .d-progress { font-size: 0.8rem; color: var(--ink-soft); }
  .day-row .chev { color: var(--accent); font-size: 1.2rem; }

  /* ---------- calendar dashboard ---------- */
  .cal { margin-top: 1.2rem; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
  .cal-title { font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .cal-nav { background: none; border: none; font-family: var(--serif); cursor: pointer; color: var(--accent); font-size: 1.9rem; line-height: 1; padding: 0.2rem 0.9rem; border-radius: 10px; }
  .cal-nav:active { background: var(--paper-deep); }
  .cal-jump { text-align: center; margin-bottom: 1rem; color: var(--ink-soft); font-size: 0.9rem; }
  .cal-jump input { font-family: var(--serif); font-size: 1rem; margin-left: 0.5rem; padding: 0.45rem 0.6rem; border: 1.5px solid var(--rule); border-radius: 10px; background: var(--paper); color: var(--ink); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-wd { text-align: center; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; padding-bottom: 0.3rem; }
  .cal-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; border: none; background: var(--paper-deep); color: var(--ink); font-family: var(--serif); font-size: 1.05rem; border-radius: 12px; cursor: pointer; }
  .cal-cell.blank { background: none; cursor: default; }
  .cal-cell.has { background: var(--accent); color: #fdf9f1; font-weight: 700; }
  .cal-cell.today { box-shadow: inset 0 0 0 2.5px var(--accent); }
  .cal-cell.has.today { box-shadow: inset 0 0 0 2.5px #fdf9f1; }
  .cal-cell.future:not(.has) { color: var(--ink-soft); opacity: 0.5; }
  .cal-cell:not(.blank):active { transform: scale(0.94); }
  .cal-legend { display: flex; gap: 1.4rem; justify-content: center; margin-top: 1.2rem; color: var(--ink-soft); font-size: 0.85rem; }
  .cal-legend span { display: inline-flex; align-items: center; gap: 0.45rem; }
  .cal-legend .lg { width: 14px; height: 14px; border-radius: 5px; display: inline-block; }
  .cal-legend .lg.has { background: var(--accent); }
  .cal-legend .lg.none { background: var(--paper-deep); }

  .missing { text-align: center; padding: 3rem 1rem; color: var(--ink-soft); }
  .missing h2 { font-size: 1.5rem; color: var(--ink); margin-bottom: 1rem; }
  .missing p { margin-bottom: 0.8rem; }

  @media (min-width: 700px) {
    body { font-size: 21px; }
    .art h1 { font-size: 2.5rem; }
  }
</style>
</head>
<body>
<div id="app" class="wrap"></div>
<script>
(function () {
  const app = document.getElementById("app");
  const today = new Date();
  const todayIso = ymd(today);

  const READING_TAGS = [["psalm", "Psalm"], ["ot", "Old Test."], ["nt", "New Test."], ["prov", "Proverbs"]];
  let todayData = null;      // today's articles (or null if not generated)
  let apiOk = false;         // true when the generator server is reachable
  let apiBase = "";          // "" = same-origin (on the Mac); tailnet URL when remote
  const TAILNET = "https://kriss-macbook-pro.taila0e65f.ts.net:8790"; // Mac over Tailscale
  function api(path) { return apiBase ? apiBase + "/" + path : path; }
  let remoteLoved = new Set(); // loved keys synced from the Mac via loved.json
  let plan = {};             // MM-DD -> readings, for any date's passages
  let generatedSet = new Set(); // ISO dates that have articles
  let calState = null;       // {y, m} month the calendar is showing

  // ---------- helpers ----------
  function ymd(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function prettyFromIso(isoStr, withYear) {
    const [y, m, d] = isoStr.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("en-US",
      { weekday: "long", month: "long", day: "numeric", year: withYear ? "numeric" : undefined });
  }
  function esc(s) { const el = document.createElement("div"); el.textContent = s; return el.innerHTML; }
  // A tappable Scripture reference → opens the passage on BibleGateway (NIV).
  function refLink(ref) {
    const url = "https://www.biblegateway.com/passage/?version=NIV&search=" +
      encodeURIComponent(String(ref).replace(/[–—]/g, "-"));
    return '<a class="ref" href="' + url + '" target="_blank" rel="noopener">' + esc(ref) + "</a>";
  }

  // ---------- read-state (per device, localStorage) ----------
  function getRead() {
    try { return JSON.parse(localStorage.getItem("dm-read") || "{}"); } catch (e) { return {}; }
  }
  function isRead(isoStr, rank) { return !!getRead()[isoStr + "#" + rank]; }
  function markRead(isoStr, rank) {
    const r = getRead(); const k = isoStr + "#" + rank;
    if (!r[k]) { r[k] = true; try { localStorage.setItem("dm-read", JSON.stringify(r)); } catch (e) {} }
  }
  function readCount(isoStr, articles) {
    return articles.reduce((n, a) => n + (isRead(isoStr, a.rank) ? 1 : 0), 0);
  }

  // ---------- loved-state (device localStorage + synced-down loved.json) ----------
  function getLovedLocal() {
    try { return JSON.parse(localStorage.getItem("dm-loved") || "{}"); } catch (e) { return {}; }
  }
  function isLoved(key) { return !!getLovedLocal()[key] || remoteLoved.has(key); }
  function toggleLove(key) {
    const l = getLovedLocal();
    const now = !l[key];
    if (now) l[key] = true; else delete l[key];
    try { localStorage.setItem("dm-loved", JSON.stringify(l)); } catch (e) {}
    if (now) remoteLoved.add(key); else remoteLoved.delete(key);
    if (apiOk) {
      fetch(api("api/love"), { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, loved: now }) }).catch(() => {});
    }
    return now;
  }

  // ---------- generator server detection ----------
  // Try same-origin first (running on the Mac); if that fails, try the Mac over
  // Tailscale (phone/anywhere). Returns {base, info} or null.
  function pingUrl(base) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 2800);
    return fetch((base ? base + "/" : "") + "api/ping", { signal: ctrl.signal, cache: "no-store" })
      .then(r => r.ok ? r.json() : null).catch(() => null).finally(() => clearTimeout(t))
      .then(info => info ? { base, info } : null);
  }
  function ping() {
    return pingUrl("").then(res => res || pingUrl(TAILNET));
  }
  function loadRemoteLoved() {
    return fetch("loved.json", { cache: "no-store" }).then(r => r.ok ? r.json() : null)
      .then(d => { if (d && Array.isArray(d.loved)) remoteLoved = new Set(d.loved); })
      .catch(() => {});
  }
  function loadPlan() {
    return fetch("plan.json", { cache: "no-store" }).then(r => r.ok ? r.json() : {})
      .then(p => { plan = p; }).catch(() => {});
  }
  function loadGenerated() {
    return fetch("content/index.json", { cache: "no-store" }).then(r => r.ok ? r.json() : { days: [] })
      .then(idx => { generatedSet = new Set(idx.days || []); }).catch(() => {});
  }
  function goToday() {
    if (todayData) renderHome(); else renderMissing(plan[todayIso.slice(5)]);
  }

  // Generate a specific date; onSuccess(data) fires when the articles are ready.
  function runGenerate(iso, btn, noteEl, force, onSuccess) {
    btn.disabled = true;
    btn.textContent = "Writing the articles…";
    const fail = (msg) => { btn.disabled = false; btn.textContent = "Try again"; noteEl.textContent = msg; };
    const poll = () => {
      fetch(api("api/gen-status"), { cache: "no-store" }).then(r => r.json()).then(s => {
        if (s.running) { noteEl.textContent = (s.phase || "Working…") + " (this takes a few minutes)"; return setTimeout(poll, 3000); }
        if (s.done && s.result) {
          if (s.result.ok && s.result.articles) {
            const data = { date: iso, readings: plan[iso.slice(5)] || {}, articles: s.result.articles };
            dayCache[iso] = data; generatedSet.add(iso);
            if (iso === todayIso) todayData = data;
            noteEl.textContent = "Done!";
            onSuccess(data);
          } else fail("Couldn’t generate: " + (s.result.error || "unknown error"));
        } else { setTimeout(poll, 3000); }
      }).catch(e => setTimeout(poll, 4000));
    };
    fetch(api("api/generate"), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ date: iso, force: !!force }) })
      .then(r => r.json())
      .then(res => { if (res.ok) { noteEl.textContent = "Starting…"; poll(); } else fail("Couldn’t start: " + (res.error || "unknown")); })
      .catch(e => fail("Couldn’t reach the generator: " + e));
  }
  function generateToday(btn, noteEl, force) { runGenerate(todayIso, btn, noteEl, force, () => renderHome()); }

  function readingsList(readings, heading) {
    return '<div class="readings-card"><h2>' + heading + '</h2><ul>' +
      READING_TAGS.map(([k, label]) => readings[k] ? '<li><span class="tag">' + label + "</span><span>" + refLink(readings[k]) + "</span></li>" : "").join("") +
      "</ul></div>";
  }

  // ---------- home ----------
  function renderHome() {
    window.scrollTo(0, 0);
    if (!todayData) return; // renderMissing already showed
    const total = todayData.articles.reduce((s, a) => s + a.minutes, 0);
    const done = readCount(todayIso, todayData.articles);
    const left = todayData.articles.length - done;
    const primaryLabel = done === 0
      ? "Read Today’s " + todayData.articles.length + " Articles"
      : (left > 0 ? "Continue — " + left + " left to read" : "Reread Today’s Articles");
    const primarySmall = done === 0 ? total + " minute read" : done + " of " + todayData.articles.length + " read";
    app.innerHTML =
      '<header class="masthead"><div class="brand">Daily Manna</div><div class="brand-rule"></div>' +
      '<div class="home-date">' + prettyFromIso(todayIso, true) + "</div></header>" +
      readingsList(todayData.readings, "Today’s Readings") +
      '<div class="choice">' +
      '<button class="btn btn-primary" id="read-all">' + primaryLabel + "<small>" + primarySmall + "</small></button>" +
      '<button class="btn btn-secondary" id="read-best">Just the Best One<small>' + todayData.articles[0].minutes + " minutes</small></button>" +
      "</div>" +
      '<button class="archive-link" id="browse">Browse by date ›</button>' +
      (apiOk ? '<button class="archive-link regen" id="regen">↻ Regenerate today</button>' : "") +
      '<p class="home-note">Fresh articles from today’s passages, every morning.</p>';
    document.getElementById("read-all").onclick = () => openDay(todayIso, todayData, { bestOnly: false, onBack: renderHome });
    document.getElementById("read-best").onclick = () => openDay(todayIso, todayData, { bestOnly: true, onBack: renderHome });
    document.getElementById("browse").onclick = renderCalendar;
    const regen = document.getElementById("regen");
    if (regen) regen.onclick = () => {
      if (!confirm("Rewrite today’s 4 articles? This replaces the current set.")) return;
      const note = document.createElement("div"); note.className = "gen-note"; regen.after(note);
      generateToday(regen, note, true);
    };
  }

  // ---------- calendar dashboard ----------
  function isoFor(y, m, d) {
    return y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
  }
  function renderCalendar() {
    window.scrollTo(0, 0);
    if (!calState) { const t = new Date(); calState = { y: t.getFullYear(), m: t.getMonth() }; }
    const { y, m } = calState;
    const title = new Date(y, m, 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });
    const first = new Date(y, m, 1).getDay();
    const days = new Date(y, m + 1, 0).getDate();
    const wd = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
    let cells = "";
    for (let i = 0; i < first; i++) cells += '<div class="cal-cell blank"></div>';
    for (let d = 1; d <= days; d++) {
      const iso = isoFor(y, m, d);
      const cls = "cal-cell" + (generatedSet.has(iso) ? " has" : "") +
        (iso === todayIso ? " today" : "") + (iso > todayIso ? " future" : "");
      cells += '<button class="' + cls + '" data-iso="' + iso + '">' + d + "</button>";
    }
    app.innerHTML =
      '<header class="masthead"><div class="brand">Daily Manna</div><div class="brand-rule"></div></header>' +
      '<div class="cal">' +
        '<div class="cal-head"><button class="cal-nav" id="prev" aria-label="previous month">‹</button>' +
        '<div class="cal-title">' + title + "</div>" +
        '<button class="cal-nav" id="next" aria-label="next month">›</button></div>' +
        '<div class="cal-jump"><label>Jump to a date <input type="date" id="jump" value="' + todayIso + '"></label></div>' +
        '<div class="cal-grid">' + wd.map(w => '<div class="cal-wd">' + w + "</div>").join("") + cells + "</div>" +
        '<div class="cal-legend"><span><span class="lg has"></span> Has articles</span>' +
        '<span><span class="lg none"></span> None yet</span></div>' +
      "</div>" +
      '<button class="archive-link" id="home">‹ Back to Today</button>';
    document.getElementById("home").onclick = goToday;
    document.getElementById("prev").onclick = () => { calState = { y: m === 0 ? y - 1 : y, m: m === 0 ? 11 : m - 1 }; renderCalendar(); };
    document.getElementById("next").onclick = () => { calState = { y: m === 11 ? y + 1 : y, m: m === 11 ? 0 : m + 1 }; renderCalendar(); };
    document.getElementById("jump").onchange = (e) => { if (e.target.value) openDate(e.target.value); };
    app.querySelectorAll(".cal-cell[data-iso]").forEach(c => { c.onclick = () => openDate(c.dataset.iso); });
  }

  function openDate(iso) {
    if (iso === todayIso) return goToday();
    renderDayCard(iso);
  }

  // A single date's page: its readings, then Read (if it has articles) or Generate.
  function renderDayCard(iso) {
    window.scrollTo(0, 0);
    const readings = plan[iso.slice(5)];
    const has = generatedSet.has(iso);
    const back = () => renderDayCard(iso);
    app.innerHTML =
      '<div class="topbar"><div class="topbar-inner"><button id="back">‹ Calendar</button>' +
      '<span class="where">' + prettyFromIso(iso, false) + "</span></div></div>" +
      '<main class="reading" style="padding-top:3.6rem">' +
      '<div class="home-date" style="text-align:center">' + prettyFromIso(iso, true) + "</div>" +
      (readings ? readingsList(readings, "Readings for this day")
        : '<div class="missing"><p>No reading plan entry for this date.</p></div>') +
      (readings && has
        ? '<div class="choice"><button class="btn btn-primary" id="read-all">Read the 4 Articles</button>' +
          '<button class="btn btn-secondary" id="read-best">Just the Best One</button></div>' +
          (apiOk ? '<button class="archive-link regen" id="regen">↻ Regenerate this day</button>' : "")
        : readings
          ? (apiOk
              ? '<div class="gen-wrap"><p class="home-note" style="margin-top:0">No articles for this day yet.</p>' +
                '<button class="btn btn-primary" id="gen">✍️ Generate this day’s devotions</button>' +
                '<div class="gen-note" id="gen-note"></div></div>'
              : '<div class="missing"><p>No articles yet. Open this day on your Mac to generate them.</p></div>')
          : "") +
      "</main>";
    document.getElementById("back").onclick = renderCalendar;
    if (readings && has) {
      document.getElementById("read-all").onclick = () => loadDay(iso).then(d => openDay(iso, d, { bestOnly: false, onBack: back }));
      document.getElementById("read-best").onclick = () => loadDay(iso).then(d => openDay(iso, d, { bestOnly: true, onBack: back }));
      const rg = document.getElementById("regen");
      if (rg) rg.onclick = () => {
        if (!confirm("Rewrite this day’s 4 articles? This replaces the current set.")) return;
        const n = document.createElement("div"); n.className = "gen-note"; rg.after(n);
        runGenerate(iso, rg, n, true, (d) => openDay(iso, d, { bestOnly: false, onBack: back }));
      };
    } else if (readings && apiOk) {
      const gen = document.getElementById("gen");
      if (gen) gen.onclick = () => runGenerate(iso, gen, document.getElementById("gen-note"), false,
        (d) => openDay(iso, d, { bestOnly: false, onBack: back }));
    }
  }

  const dayCache = {};
  function loadDay(isoStr) {
    if (dayCache[isoStr]) return Promise.resolve(dayCache[isoStr]);
    return fetch("content/" + isoStr + ".json", { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error("no content"); return r.json(); })
      .then(d => { dayCache[isoStr] = d; return d; });
  }

  // Save one article as a PDF via the browser's print-to-PDF (works on phone
  // via the share sheet). We isolate the target article, print, then restore.
  function exportPdf(sec) {
    const wasCollapsed = sec.classList.contains("collapsed");
    sec.classList.remove("collapsed");
    document.body.classList.add("printing");
    sec.classList.add("print-target");
    let done = false;
    const cleanup = () => {
      if (done) return; done = true;
      window.removeEventListener("afterprint", cleanup);
      document.body.classList.remove("printing");
      sec.classList.remove("print-target");
      if (wasCollapsed) sec.classList.add("collapsed");
    };
    window.addEventListener("afterprint", cleanup);
    setTimeout(cleanup, 60000);       // fallback if afterprint never fires (some mobile browsers)
    setTimeout(() => window.print(), 80);
  }

  // ---------- reading ----------
  function articleHtml(a, idx, count, isoStr, collapsed) {
    const key = isoStr + "#" + a.rank;
    const loved = isLoved(key);
    return '<section class="art' + (collapsed ? " collapsed" : "") + '" data-rank="' + a.rank + '">' +
      '<div class="print-head">Daily Manna &middot; ' + esc(prettyFromIso(isoStr, true)) + "</div>" +
      (idx > 0 ? '<div class="divider">Article ' + (idx + 1) + " of " + count + "</div>" : "") +
      '<button class="art-head">' +
      '<div class="kicker"><span>' + refLink(a.passage) + '</span><span class="mins">' + a.minutes + " min read</span></div>" +
      "<h1>" + esc(a.title) + "</h1>" +
      '<div class="read-badge"><span class="chev">✓</span> Read · tap to reopen' +
      (loved ? ' <span class="heart">♥</span>' : "") + "</div>" +
      "</button>" +
      '<div class="art-body">' +
      '<p class="dek">' + esc(a.dek) + "</p>" +
      '<div class="body">' + a.body + "</div>" +
      '<div class="end-mark">❦</div>' +
      '<button class="love-btn' + (loved ? " loved" : "") + '" data-key="' + key + '">' +
      '<span class="ic">' + (loved ? "♥" : "♡") + '</span> ' + (loved ? "Loved" : "Love this") + "</button>" +
      '<button class="export-btn">⬇ Save as PDF</button>' +
      '<button class="collapse-btn">Collapse ▲</button>' +
      "</div></section>";
  }

  function openDay(isoStr, data, opts) {
    const arts = data.articles.slice().sort((x, y) => x.rank - y.rank);
    const shown = opts.bestOnly ? [arts[0]] : arts;
    const unreadCount = shown.filter(a => !isRead(isoStr, a.rank)).length;
    app.innerHTML =
      '<div class="topbar"><div class="topbar-inner"><button id="back">‹ Back</button>' +
      '<span class="where">' + prettyFromIso(isoStr, false) + "</span></div>" +
      '<div class="progress"><div id="pbar"></div></div></div>' +
      '<main class="reading">' +
      (!opts.bestOnly && unreadCount === 0 && shown.length > 1
        ? '<div class="allread"><strong>You’ve read all of these.</strong> Tap any title to read it again.</div>' : "") +
      shown.map((a, i) => articleHtml(a, i, shown.length, isoStr, isRead(isoStr, a.rank))).join("") +
      (opts.bestOnly && arts.length > 1
        ? '<div class="more-wrap"><button class="btn btn-secondary" id="more">Keep reading the other ' + (arts.length - 1) + " articles</button></div>"
        : "") +
      '<div class="finish"><p class="verse">“Your word is a lamp for my feet, a light on my path.” — Psalm 119:105</p>' +
      '<button class="btn btn-secondary" id="done">Done</button></div>' +
      "</main>";
    window.scrollTo(0, 0);

    document.getElementById("back").onclick = opts.onBack;
    document.getElementById("done").onclick = opts.onBack;
    const more = document.getElementById("more");
    if (more) more.onclick = () => openDay(isoStr, data, { bestOnly: false, onBack: opts.onBack });

    // expand / collapse + love toggles
    app.querySelectorAll(".art").forEach(sec => {
      sec.querySelector(".art-head").onclick = () => { if (sec.classList.contains("collapsed")) sec.classList.remove("collapsed"); };
      sec.querySelector(".collapse-btn").onclick = () => {
        sec.classList.add("collapsed");
        sec.scrollIntoView({ block: "start" });
        window.scrollBy(0, -60);
      };
      const lb = sec.querySelector(".love-btn");
      lb.onclick = () => {
        const now = toggleLove(lb.dataset.key);
        lb.classList.toggle("loved", now);
        lb.innerHTML = '<span class="ic">' + (now ? "♥" : "♡") + '</span> ' + (now ? "Loved" : "Love this");
      };
      sec.querySelector(".export-btn").onclick = () => exportPdf(sec);
    });

    // progress bar + mark-as-read: an article counts as read once its end
    // mark scrolls up past the lower part of the viewport. Driven off scroll
    // position (getBoundingClientRect) so it works without IntersectionObserver.
    const pbar = document.getElementById("pbar");
    const ends = [...app.querySelectorAll(".art .end-mark")];
    const update = () => {
      if (!pbar.isConnected) { window.removeEventListener("scroll", update); return; }
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      pbar.style.width = (max > 0 ? ((window.scrollY || h.scrollTop) / max) * 100 : 0) + "%";
      const trigger = window.innerHeight * 0.85;
      ends.forEach(el => {
        if (el.offsetParent === null) return; // inside a collapsed article
        if (el.getBoundingClientRect().top < trigger) markRead(isoStr, Number(el.closest(".art").dataset.rank));
      });
    };
    window.addEventListener("scroll", update, { passive: true });
    update();
  }

  function renderMissing(planReadings) {
    app.innerHTML =
      '<header class="masthead"><div class="brand">Daily Manna</div><div class="brand-rule"></div>' +
      '<div class="home-date">' + prettyFromIso(todayIso, true) + "</div></header>" +
      (planReadings ? readingsList(planReadings, "Today’s Readings") : "") +
      '<div class="missing"><h2>Today’s articles aren’t ready yet</h2>' +
      (apiOk
        ? '<p>Tap below and Daily Manna will write today’s four articles for you.</p>'
          + '<div class="gen-wrap"><button class="btn btn-primary" id="gen">✍️ Generate today’s devotions</button>'
          + '<div class="gen-note" id="gen-note"></div></div>'
        : '<p>Open the app on your Mac (or say <em>“today’s devotions”</em> in Claude Code) to generate them.</p>'
          + "<p>In the meantime, today’s passages are listed above — the Word itself is always ready.</p>") +
      '<button class="archive-link" id="browse">Browse by date ›</button></div>';
    document.getElementById("browse").onclick = renderCalendar;
    const gen = document.getElementById("gen");
    if (gen) gen.onclick = () => generateToday(gen, document.getElementById("gen-note"));
  }

  // ---------- boot ----------
  // Offline cache: keeps generated articles readable with no Mac / no VPN / no signal.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
  Promise.all([ping(), loadRemoteLoved(), loadPlan(), loadGenerated()])
    .then(([p]) => { if (p) { apiBase = p.base; apiOk = !!(p.info && p.info.canGenerate); } })
    .then(() => loadDay(todayIso).then(d => { todayData = d; }).catch(() => {}))
    .then(() => goToday());
})();
</script>
</body>
</html>
